# Sertleştirilmiş yapılandırma (ADIM 9): anonim erişim kapalı, kullanıcı/parola + topic ACL.
# Kullanıcı/parola dosyasını üretmek için: deploy/mosquitto/setup-auth.sh
listener 1883
allow_anonymous false
password_file /mosquitto/config/passwd
acl_file /mosquitto/config/acl

# WebSocket listener (opsiyonel)
listener 9001
protocol websockets

persistence true
persistence_location /mosquitto/data/
log_dest stdout
