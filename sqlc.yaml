version: "2"
sql:
  - engine: "postgresql"
    schema: "migrations"
    queries: "db/query"
    gen:
      go:
        package: "db"
        out: "internal/infra/postgres/db"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_pointers_for_null_types: true
        emit_interface: true
        overrides:
          - db_type: "timestamptz"
            go_type: "time.Time"
          - db_type: "timestamptz"
            nullable: true
            go_type:
              import: "time"
              type: "Time"
              pointer: true
